services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: all9s_dev_password
      POSTGRES_DB: all9ssolutions
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
